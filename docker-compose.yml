services:
  app:
    build: .
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
      - COOKIE_SECURE=true
      - DB_PATH=/data/data.db
    volumes:
      - app_data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app_data:
  caddy_data:
  caddy_config:
